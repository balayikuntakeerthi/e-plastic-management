
{% extends 'base.html' %}

{% block content %}
<h2 class="text-success">Waste Management Dashboard</h2>
<hr>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="chart-card">
            <h5 class="text-center">Waste by Location</h5>
            <canvas id="locationChart"></canvas>
        </div>
    </div>
    <div class="col-md-6">
        <div class="chart-card">
            <h5 class="text-center">Waste by Plastic Type</h5>
            <canvas id="typeChart"></canvas>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="chart-card">
            <h5 class="text-center">Waste Over Time</h5>
            <canvas id="timeChart"></canvas>
        </div>
    </div>
    <div class="col-md-6">
        <div class="chart-card">
            <h5 class="text-center">Recyclable vs Non Recyclable</h5>
            <canvas id="recyclableChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    fetch('/api/waste-by-location')
    .then(res => res.json())
    .then(data => {
        new Chart(document.getElementById('locationChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(data),
                datasets: [{ label: 'Waste (kg)', data: Object.values(data), backgroundColor: '#198754' }]
            }
        });
    });

    fetch('/api/waste-by-type')
    .then(res => res.json())
    .then(data => {
        new Chart(document.getElementById('typeChart'), {
            type: 'pie',
            data: {
                labels: Object.keys(data),
                datasets: [{ data: Object.values(data), backgroundColor: ['#198754', '#0d6efd', '#ffc107', '#dc3545', '#6f42c1', '#fd7e14', '#20c997', '#0dcaf0', '#d63384', '#adb5bd', '#343a40', '#6610f2'] }]
            }
        });
    });

    fetch('/api/waste-over-time')
    .then(res => res.json())
    .then(data => {
        new Chart(document.getElementById('timeChart'), {
            type: 'line',
            data: {
                labels: Object.keys(data),
                datasets: [{ label: 'Waste (kg)', data: Object.values(data), borderColor: '#198754', backgroundColor: 'rgba(25,135,84,0.2)', tension: 0.4, fill: true }]
            }
        });
    });

    fetch('/api/recyclable-vs-nonrecyclable')
    .then(res => res.json())
    .then(data => {
        new Chart(document.getElementById('recyclableChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{ data: Object.values(data), backgroundColor: ['#198754', '#dc3545'] }]
            }
        });
    });
</script>
{% endblock %}
